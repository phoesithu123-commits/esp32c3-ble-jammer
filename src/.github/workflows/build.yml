name: Build ESP32-C3 Firmware

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PlatformIO
        run: |
          pip install --upgrade pip
          pip install platformio
      
      - name: Build Firmware
        run: pio run
      
      - name: Prepare firmware artifacts
        run: |
          mkdir -p firmware_files
          cp .pio/build/esp32-c3-devkitc-02/bootloader.bin firmware_files/ 2>/dev/null || true
          cp .pio/build/esp32-c3-devkitc-02/partitions.bin firmware_files/ 2>/dev/null || true
          cp .pio/build/esp32-c3-devkitc-02/boot_app0.bin firmware_files/ 2>/dev/null || true
          cp .pio/build/esp32-c3-devkitc-02/firmware.bin firmware_files/ 2>/dev/null || true
          cp .pio/build/esp32-c3-devkitc-02/merged-firmware.bin firmware_files/ 2>/dev/null || true
          ls -la firmware_files/
      
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32c3-ble-jammer-firmware
          path: firmware_files/
          compression-level: 9
      
      - name: Create GitHub Release (on tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware_files/*
          generate_release_notes: true
          make_latest: true
